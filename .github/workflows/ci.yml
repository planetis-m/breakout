name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: stable
          repo-token: ${{ github.token }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            libasound2-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxi-dev \
            libxrandr-dev \
            wayland-protocols

      - name: Build raylib
        run: |
          git clone --depth 1 https://github.com/raysan5/raylib.git /tmp/raylib
          cmake -S /tmp/raylib -B /tmp/raylib/build \
            -DBUILD_SHARED_LIBS=ON \
            -DCUSTOMIZE_BUILD=ON \
            -DSUPPORT_CUSTOM_FRAME_CONTROL=ON \
            -DGLFW_BUILD_WAYLAND=ON \
            -DGLFW_BUILD_X11=ON
          cmake --build /tmp/raylib/build --config Release
          cp /tmp/raylib/src/raylib.h .
          find /tmp/raylib/build -maxdepth 2 -name 'libraylib.so*' -exec cp {} . \;

      - name: Build game
        run: nim c -d:release game.nim

  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: stable
          repo-token: ${{ github.token }}

      - name: Install build tools
        run: brew install cmake

      - name: Build raylib
        run: |
          git clone --depth 1 https://github.com/raysan5/raylib.git /tmp/raylib
          cmake -S /tmp/raylib -B /tmp/raylib/build \
            -DBUILD_SHARED_LIBS=ON \
            -DCUSTOMIZE_BUILD=ON \
            -DSUPPORT_CUSTOM_FRAME_CONTROL=ON
          cmake --build /tmp/raylib/build --config Release
          cp /tmp/raylib/src/raylib.h .
          find /tmp/raylib/build -maxdepth 2 -name 'libraylib*.dylib' -exec cp {} . \;

      - name: Build game
        run: nim c -d:release game.nim

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: stable
          repo-token: ${{ github.token }}

      - name: Install system dependencies
        uses: johnwason/vcpkg-action@v7
        id: vcpkg
        env:
          VCPKG_CMAKE_CONFIGURE_OPTIONS: -DCUSTOMIZE_BUILD=ON -DSUPPORT_CUSTOM_FRAME_CONTROL=ON
        with:
          pkgs: raylib
          triplet: x64-windows-release
          token: ${{ github.token }}

      - name: Copy raylib runtime
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg\installed\x64-windows-release
        run: |
          Copy-Item "$env:VCPKG_ROOT\bin\raylib.dll" .\raylib.dll -Force

      - name: Build game
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg\installed\x64-windows-release
        run: |
          $env:PATH = "$env:VCPKG_ROOT\bin;$pwd;$env:PATH"
          nim c --cc:vcc -d:VcpkgRoot="$env:VCPKG_ROOT" -d:release game.nim
